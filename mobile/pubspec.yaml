name: freelance_radar
description: "FreelanceRadar — تجميع فرص العمل الحر لتطوير تطبيقات الموبايل."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Firebase
  firebase_core: ^3.6.0
  cloud_firestore: ^5.4.0

  # State management
  provider: ^6.1.2

  # External links
  url_launcher: ^6.3.0

  # Local storage
  shared_preferences: ^2.3.0

  # UI
  shimmer: ^3.0.0
  cached_network_image: ^3.4.0
  flutter_svg: ^2.0.10

  # Date / time
  timeago: ^3.7.0
  intl: ^0.20.2

  # Pull to refresh
  pull_to_refresh_flutter3: ^2.0.2

  # Local notifications
  flutter_local_notifications: ^17.2.2
  permission_handler: ^11.3.1

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
